<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{board/resources/stylesheets/board.css}">
    <script defer th:src="@{/board/resources/scripts/detail.js}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
 <table class="table table-striped table-hover">
     <thead>
     <tr>
         <th>번호</th>
         <th class="ten wide">글제목</th>
         <th class="two wide">작성자</th>
         <th class="three wide">작성일</th>
         <th class="three wide">조회수</th>
     </tr>
     </thead>
     <tbody>
     <!-- CONTENTS !-->
     <tr th:each="board : ${boardList}">
         <td>
             <span th:text="${board.id}"></span>
         </td>
         <td>
             <a th:href="@{'/board/' + ${board.id}}">
                 <span th:text="${board.boardTitle}"></span>
             </a>
         </td>
         <td>
             <span th:text="${board.boardWriter}"></span>
         </td>
         <td>
             <span th:text="${#temporals.format(board.boardCreatedTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
         </td>
         <td>
             <span th:text="${board.boardHits}"></span>
         </td>
     </tr>
     </tbody>
 </table>
 <nav aria-label="Page navigation example">
     <ul class="pagination justify-content-center">
         <li class="page-item" th:classappend="${1 == boardList.pageable.pageNumber + 1} ? 'disabled'">
             <a class="page-link" href="#" th:href="@{/board/list(page=${boardList.pageable.pageNumber - 1})}" tabindex="-1" aria-disabled="true">Previous</a>
         </li>
         <li class="page-item" th:classappend="${i == boardList.pageable.pageNumber + 1} ? 'disabled'" th:each="i : ${#numbers.sequence(startPage, endPage)}">
             <a class="page-link" href="#" th:href="@{/board/list(page=${i - 1})}" th:text="${i}">1</a>
         </li>
         <li class="page-item" th:classappend="${boardList.totalPages == boardList.pageable.pageNumber + 1} ? 'disabled'">
             <a class="page-link" href="#" th:href="@{/board/list(page=${boardList.pageable.pageNumber + 1})}">Next</a>
         </li>
     </ul>
     <button onclick="saveReq()">글작성</button>
 </nav>
</body>
<script>
    const saveReq = () => {
        location.href = "/board/save";
    }

</script>
</html>
