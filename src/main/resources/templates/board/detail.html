<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>detail</title>
    <link rel="stylesheet" th:href="@{/board/resources/stylesheets/detail.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script defer th:src="@{/board/resources/scripts/detail.js}"></script>
</head>
<style>
    .table{
        width: 500px;
        margin: 0 auto;
    }
    .button{
        display: flex;
        justify-content: center;
        gap: 5px;
    }
    button{
        width: 120px;
    }
</style>
<body>
<table class="table">
    <tr>
        <th>id</th>
        <td th:text="${board.id}"></td>
    </tr>
    <tr>
        <th>제목</th>
        <td th:text="${board.boardTitle}"></td>
    </tr>
    <tr>
        <th>작성자</th>
        <td th:text="${board.boardWriter}"></td>
    </tr>
    <tr>
        <th>날짜</th>
        <td th:text="${board.boardCreatedTime}"></td>
    </tr>
    <tr>
        <th>조회수</th>
        <td th:text="${board.boardHits}"></td>
    </tr>
    <tr>
        <th>내용</th>
        <td th:text="${board.boardContents}"></td>
    </tr>
</table>
<div class="button">
<button onclick="saveReq()">글작성</button>
<button onclick="listReq()">게시판 목록</button>
<button onclick="updatrReq()">수정</button>
<button onclick="deleteReq()">삭제</button>
</div>
</body>
<script th:inline="javascript">
    const saveReq = () => {
        location.href = "/board/save"
    }
        const listReq = () => {
        location.href = "/board/list"
    }
    const updatrReq =() =>{
        const id = [[${board.id}]]; // 모델로 받아온 id를 자바스크립트에서 사용 하기 위해서는 <script th:inline="javascript"> 필요
        location.href = "/board/update/" + id;
    }
    const deleteReq = () => {
        const id = [[${board.id}]];
        location.href = "/board/delete/" + id;
    }
</script>
</html>
